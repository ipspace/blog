---
baseURL: https://blog.ipspace.net/
languageCode: en-us
title: ipSpace.net blog
theme: ipspace
summaryLength: 70
#uglyurls: true
paginate: 15

author:
  name: Ivan Pepelnjak

permalinks:
  posts: "/:year/:month/:contentbasename"
  eigrp: "/eigrp/:contentbasename"
  draft: "/draft/:contentbasename"
  archm: "/:year/:month/"
  archy: "/:year/"
  tags: "/tag/:title"
  pages: "/p/:title"

taxonomies:
  tag: tags
  series: series
  feeds: feeds

services:
  rss:
    limit: 1024

outputs:
  home: [ html, atom, rss ]
  section: [ html ]
  term: [ html, atom ]

params:
  feedSections: [ posts ]
  series_weight: 0
  notags:
  - Workshop
  - Podcast
  - Training
  - workshop
  - podcast
  - training
  - "You've asked for it"
  - "you've asked for it"
  - "Gestalt IT"
  - marketing
  - Subscription
  - Video
  - subscription
  - video

markup:
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
