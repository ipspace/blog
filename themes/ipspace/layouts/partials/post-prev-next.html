{{ if or .Next .Prev }}
<div class="post-nav">
  <div class="container">
    {{ if .Next }}
      <a class="post-nav__link prev" href="{{ .Next.Permalink }}" title="Newer Post">
        <svg class="post-nav__icon">
          <use xlink:href="#arrow-left-big"></use>
        </svg>
        <span class="post-nav__text">Newer Post</span>
      </a>
    {{ end }}
    <a class="post-nav__link overview" href="/">Home</a>
    {{ if .Prev }}
      <a class="post-nav__link next" href="{{ .Prev.Permalink  }}" title="Older Post">
        <span class="post-nav__text">Older Post</span>
        <svg class="post-nav__icon">
          <use xlink:href="#arrow-right-big"></use>
        </svg>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
